
# Tmux Configuration
# Generated with TmuxAI Config Generator
# https://tmuxai.dev

# -- Essentials ----------------------------------------------
# Set terminal with proper colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set-option -w -g aggressive-resize on
set -sg escape-time 0

# -- Basic Settings ------------------------------------------
set -g prefix C-b
set -g history-limit 5000
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set-option -g renumber-windows on

# -- Key Bindings -------------------------------------------
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"
bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -- Status Bar ---------------------------------------------
set -g status-position bottom
set -g status-interval 1
set -g status-right '#(free -m | awk "NR==2{printf \"ram: %.0f%%\", \$3/\$2*100}") | cpu: #(vmstat 1 2 | tail -1 | awk "{print 100-\$15\"%\"}")'
set -g status-left-length 50
set -g status-right-length 50

# source ~/.config/tmux/current-theme.conf

# -- Theme (inherits from terminal palette, follows kitty light/dark) --
set -g status-style fg=terminal,bg=terminal
set -g window-status-format '#[fg=brightblack] #I #W '
set -g window-status-current-format '#[fg=terminal,bold] #I #W '
